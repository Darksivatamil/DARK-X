<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DARK-X | System Access</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap">
    <link rel="stylesheet" href="/static/css/main.css">
    <link rel="stylesheet" href="/static/css/login.css">
</head>
<body class="login-page">
    <div class="bg-grid"></div>
    <div class="login-card">
        <div class="login-logo">
            <svg width="36" height="36" viewBox="0 0 32 32" fill="none">
                <path d="M16 2L2 8v16l14 6 14-6V8L16 2z" stroke="#7c3aed" stroke-width="2" fill="rgba(124,58,237,0.15)"/>
                <path d="M16 6l10 4.5v9L16 24 6 19.5v-9L16 6z" fill="rgba(124,58,237,0.3)"/>
                <circle cx="16" cy="14" r="3" fill="#7c3aed"/>
            </svg>
            <h1 class="login-title">DARK-X</h1>
        </div>
        <p class="login-subtitle">From Zero to Shadow Monarch</p>

        <div id="auth-form">
            <div id="email-group" class="input-group" style="display:none;">
                <label>Email</label>
                <input type="email" id="email" placeholder="shadow@dark-x.dev">
            </div>
            <div class="input-group">
                <label>Username</label>
                <input type="text" id="username" placeholder="Enter your username">
            </div>
            <div class="input-group">
                <label>Access Code</label>
                <input type="password" id="password" placeholder="Enter your password">
            </div>
            <div id="confirm-group" class="input-group" style="display:none;">
                <label>Confirm Access Code</label>
                <input type="password" id="confirm-password" placeholder="Confirm your password">
            </div>
            <div id="error-box" class="error-box"></div>
            <button class="btn-primary" id="btn-login">Awaken System</button>
            <div class="toggle-link" id="toggle-text">
                No account? <span id="toggle-register">Register Identity</span>
            </div>
        </div>
    </div>
    <script src="/static/js/auth.js"></script>
</body>
</html>
